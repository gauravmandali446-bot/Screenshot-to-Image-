<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="50%" stop-color="#4f46e5" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- Accent Gradient for X -->
    <linearGradient id="xGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Glassmorphism card gradient -->
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.05" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="120" fill="url(#bgGrad)" />

  <!-- Stylized Decorative Glow in the corner -->
  <circle cx="450" cy="80" r="120" fill="#06b6d4" opacity="0.15" filter="blur(40px)" />

  <!-- Photographic image representation (Left side / Background layer) -->
  <g transform="translate(64, 96)">
    <!-- Main Photo Card -->
    <rect width="240" height="240" rx="32" fill="url(#cardGrad)" stroke="#ffffff" stroke-width="4" stroke-opacity="0.4" />
    
    <!-- Photo Content: Mountain peak -->
    <path d="M40 200 L110 110 L160 160 L200 110 L240 200 Z" fill="#ffffff" fill-opacity="0.25" />
    <path d="M80 200 L140 130 L190 180 L220 150 L240 200 Z" fill="#ffffff" fill-opacity="0.35" />
    
    <!-- Photo Content: Sun -->
    <circle cx="180" cy="70" r="24" fill="#ffffff" fill-opacity="0.6" />
  </g>

  <!-- High-speed Conversion Arrow -->
  <path d="M260 256 L300 256" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-dasharray="2 12" stroke-opacity="0.8" />
  <path d="M275 240 L305 256 L275 272" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" stroke-opacity="0.8" />

  <!-- Modern Badging Layer (Right side / Foreground layer) -->
  <g transform="translate(230, 210)">
    <!-- Badging Glass Plate -->
    <rect width="218" height="206" rx="40" fill="#0f172a" opacity="0.85" stroke="#ffffff" stroke-width="4" stroke-opacity="0.2" />
    
    <!-- JPG Text -->
    <text x="36" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="76" font-weight="900" fill="#ffffff" letter-spacing="-2">JPG</text>
    
    <!-- Stylized "X" Accent -->
    <text x="176" y="132" font-family="system-ui, -apple-system, sans-serif" font-size="82" font-weight="900" fill="url(#xGrad)" font-style="italic">X</text>
    
    <!-- Bottom sub-label -->
    <rect x="36" y="148" width="146" height="24" rx="12" fill="url(#xGrad)" opacity="0.2" />
    <text x="109" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="800" fill="#10b981" text-anchor="middle" letter-spacing="3">CONVERTER</text>
  </g>
</svg>
